<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lunar Lullaby Dashboard</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f0f23; color:#eee; font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif; padding:16px; min-height:100vh; }

  .header { text-align:center; margin-bottom:24px; padding:20px 0; }
  .header h1 { font-size:22px; color:#e0d4ff; }
  .header .time { color:#666; font-size:12px; margin-top:6px; }
  .header .time #update-time { color:#888; }

  .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
  .card { background:#16213e; border-radius:12px; padding:16px; text-align:center; }
  .card h3 { font-size:11px; color:#888; text-transform:uppercase; margin-bottom:6px; letter-spacing:1px; }
  .card .value { font-size:28px; font-weight:bold; color:#e0d4ff; }
  .card .sub { font-size:11px; color:#666; margin-top:2px; }

  .status-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
  .status-item { background:#16213e; border-radius:10px; padding:12px; display:flex; align-items:center; gap:10px; }
  .dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .dot.green { background:#4CAF50; box-shadow:0 0 6px #4CAF50; }
  .dot.red { background:#f44336; box-shadow:0 0 6px #f44336; }
  .dot.yellow { background:#ff9800; box-shadow:0 0 6px #ff9800; }
  .status-label { font-size:13px; font-weight:bold; }
  .status-sub { font-size:11px; color:#888; }

  .section { background:#16213e; border-radius:12px; padding:16px; margin-bottom:16px; }
  .section h2 { font-size:14px; color:#e0d4ff; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #2a2a4a; }

  .video-item { padding:10px 0; border-bottom:1px solid #1a1a3a; }
  .video-item:last-child { border-bottom:none; }
  .video-title { font-size:13px; margin-bottom:4px; }
  .video-title a { color:#9db4ff; text-decoration:none; }
  .video-title a:hover { text-decoration:underline; }
  .video-meta { display:flex; gap:12px; font-size:11px; color:#888; flex-wrap:wrap; }
  .video-meta .views { color:#e0d4ff; font-weight:bold; }

  .badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; margin-right:4px; }
  .badge.public { background:#1b5e20; color:#a5d6a7; }
  .badge.private { background:#b71c1c; color:#ef9a9a; }

  .disk-bar-wrap { margin:6px 0; }
  .disk-label { font-size:12px; margin-bottom:2px; }
  .disk-bar-bg { background:#1a1a3a; border-radius:4px; height:14px; overflow:hidden; }
  .disk-bar { background:linear-gradient(90deg,#7c4dff,#b388ff); height:100%; border-radius:4px; transition:width 0.3s; }

  .loading { text-align:center; padding:40px; color:#666; }
  .spinner { display:inline-block; width:24px; height:24px; border:3px solid #333; border-top-color:#7c4dff;
    border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:8px; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .error-box { background:#2a1a1a; border:1px solid #f44336; border-radius:8px; padding:12px; color:#ef9a9a; font-size:13px; }

  @media (max-width:600px) {
    .cards { grid-template-columns:repeat(3,1fr); gap:8px; }
    .card .value { font-size:22px; }
    .card h3 { font-size:10px; }
    .status-row { grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Lunar Lullaby</h1>
  <div class="time">마지막 업데이트: <span id="update-time">로딩 중...</span></div>
</div>

<div class="cards">
  <div class="card"><h3>구독자</h3><div class="value" id="subs">-</div><div class="sub">명</div></div>
  <div class="card"><h3>총 조회수</h3><div class="value" id="views">-</div><div class="sub">회</div></div>
  <div class="card"><h3>영상</h3><div class="value" id="vcount">-</div><div class="sub">개</div></div>
</div>

<div class="status-row">
  <div class="status-item">
    <div class="dot" id="dot-yt"></div>
    <div><div class="status-label">유튜브</div><div class="status-sub" id="yt-status">확인 중</div></div>
  </div>
  <div class="status-item">
    <div class="dot" id="dot-suno"></div>
    <div><div class="status-label">Suno</div><div class="status-sub" id="suno-status">확인 중</div></div>
  </div>
  <div class="status-item">
    <div class="dot" id="dot-token"></div>
    <div><div class="status-label">토큰</div><div class="status-sub" id="token-status">확인 중</div></div>
  </div>
</div>

<div class="section">
  <h2>영상 목록</h2>
  <div id="video-list"><div class="loading"><div class="spinner"></div><br>로딩 중...</div></div>
</div>

<div class="section">
  <h2>디스크 사용량</h2>
  <div id="disk-info"><div class="loading">로딩 중...</div></div>
</div>

<script>
function loadData() {
  fetch('data.json?t=' + Date.now())
    .then(r => r.json())
    .then(render)
    .catch(() => {
      document.getElementById('video-list').innerHTML = '<div class="error-box">데이터를 불러올 수 없습니다. 잠시 후 다시 시도해주세요.</div>';
    });
}

function render(d) {
  document.getElementById('update-time').textContent = d.updated;

  // Cards
  document.getElementById('subs').textContent = Number(d.channel.subscribers).toLocaleString();
  document.getElementById('views').textContent = Number(d.channel.total_views).toLocaleString();
  document.getElementById('vcount').textContent = d.channel.total_videos;

  // Status dots
  setDot('dot-yt', d.channel.status === 'connected');
  document.getElementById('yt-status').textContent = d.channel.status === 'connected' ? d.channel.name : 'Error';

  setDot('dot-suno', d.suno.status === 'running');
  document.getElementById('suno-status').textContent = d.suno.status === 'running'
    ? d.suno.credits + '/' + d.suno.limit
    : 'OFF';

  setDot('dot-token', d.token.status === 'valid');
  document.getElementById('token-status').textContent = d.token.status === 'valid' ? 'Auto Refresh' : 'Expired!';

  // Videos
  let vh = '';
  d.videos.forEach(v => {
    const badge = v.privacy === 'public' ? '<span class="badge public">공개</span>' : '<span class="badge private">비공개</span>';
    vh += '<div class="video-item">' +
      '<div class="video-title">' + badge + '<a href="' + v.url + '" target="_blank">' + v.title + '</a></div>' +
      '<div class="video-meta"><span class="views">' + Number(v.views).toLocaleString() + '회</span>' +
      '<span>' + v.likes + ' likes</span><span>' + v.date + '</span></div></div>';
  });
  document.getElementById('video-list').innerHTML = vh;

  // Disk
  let dh = '';
  let total = 0;
  d.disk.forEach(f => {
    total += f.size_gb;
    const pct = Math.min(f.size_gb / 15 * 100, 100);
    dh += '<div class="disk-bar-wrap"><div class="disk-label">' + f.name + ' — ' + f.size_gb + ' GB</div>' +
      '<div class="disk-bar-bg"><div class="disk-bar" style="width:' + pct + '%"></div></div></div>';
  });
  dh = '<div style="font-size:12px;color:#888;margin-bottom:8px">Total: ' + total.toFixed(1) + ' GB</div>' + dh;
  document.getElementById('disk-info').innerHTML = dh;
}

function setDot(id, ok) {
  const el = document.getElementById(id);
  el.className = 'dot ' + (ok ? 'green' : 'red');
}

loadData();
setInterval(loadData, 300000); // 5분마다 자동 새로고침
</script>
</body>
</html>
